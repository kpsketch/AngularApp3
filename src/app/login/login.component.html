<div class="card">
  <div class="card-header">
    <h4>Login</h4>
  </div>

  <div class="card-body">
    <div *ngIf="success" class="alert alert-success">
      {{ success }}
    </div>

    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <form #loginForm="ngForm" (ngSubmit)="loginUser(loginForm)">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          name="email"
          class="form-control"
          [(ngModel)]="user.email"
          required
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          name="password"
          class="form-control"
          [(ngModel)]="user.password"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary">Login</button>

      <a routerLink="/register" class="btn btn-secondary ms-2">
        Go to Register
      </a>
    </form>
  </div>
</div>
