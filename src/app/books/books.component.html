<div class="card">
  <div class="card-header">
    <h4 class="mb-0">Book List</h4>
  </div>

  <div class="card-body">
    <div *ngIf="success" class="alert alert-success">
      {{ success }}
    </div>

    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <table class="table table-bordered table-striped" *ngIf="books.length > 0">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Author</th>
          <th>Description</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let book of books">
          <td>{{ book.id }}</td>
          <td>{{ book.title }}</td>
          <td>{{ book.author }}</td>
          <td>{{ book.description }}</td>
          <td>
            <a [routerLink]="['/update', book.id]" class="btn btn-primary btn-sm me-2">
              Edit
            </a>

            <button class="btn btn-danger btn-sm" (click)="deleteBook(book.id!)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="books.length === 0 && !error" class="alert alert-info">
      No books found.
    </div>
  </div>
</div>
