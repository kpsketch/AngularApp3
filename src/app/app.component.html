<h2 class="text-center mt-3">Book Browser App</h2>

<div class="text-center mb-3">
  <a routerLink="/list" class="btn btn-primary me-2">View Books</a>
  <a routerLink="/add" class="btn btn-success me-2">Add Book</a>
  <a routerLink="/register" class="btn btn-warning me-2">Register</a>
  <a routerLink="/login" class="btn btn-dark me-2">Login</a>
  <button *ngIf="loggedUser" class="btn btn-danger" (click)="logout()">Logout</button>
</div>

<div *ngIf="loggedUser" class="text-center mb-3">
  <strong>Logged in as:</strong> {{ loggedUser.name }} ({{ loggedUser.email }})
</div>

<router-outlet></router-outlet>
